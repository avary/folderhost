name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
        - auto
        - major
        - minor
      custom_version:
        description: 'Custom version (optional, format: vYY.MM.PATCH)'
        required: false
        type: string
      release_notes_override:
        description: 'Release notes override (optional, leave empty to auto-read from CHANGELOG.md)'
        required: false
        type: string

env:
  BINARY_NAME: folderhost

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      current_date: ${{ steps.date.outputs.current_date }}
      release_notes: ${{ steps.changelog.outputs.release_notes }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Calculate version
      id: version
      run: |
        CURRENT_YEAR=$(date +'%y')
        CURRENT_MONTH=$(date +'%m')
        
        CURRENT_MONTH=$((10#$CURRENT_MONTH))
        
        echo "Current date: Year=$CURRENT_YEAR, Month=$CURRENT_MONTH"
        
        if [[ -n "${{ github.event.inputs.custom_version }}" ]]; then
          VERSION="${{ github.event.inputs.custom_version }}"
          echo "Using custom version: $VERSION"
        
        elif [[ "${{ github.event.inputs.release_type }}" == "auto" ]]; then
          LATEST_TAG=$(git tag -l "v${CURRENT_YEAR}.${CURRENT_MONTH}.*" --sort=-v:refname | head -n 1)
          
          if [ -z "$LATEST_TAG" ]; then
            VERSION="v${CURRENT_YEAR}.${CURRENT_MONTH}.0"
            echo "🆕 No existing tags for this month, starting with: $VERSION"
          else
            LAST_PATCH=$(echo $LATEST_TAG | awk -F. '{print $3}')
            NEW_PATCH=$((LAST_PATCH + 1))
            VERSION="v${CURRENT_YEAR}.${CURRENT_MONTH}.${NEW_PATCH}"
            echo "⬆️ Incrementing from $LATEST_TAG to $VERSION"
          fi
        
        elif [[ "${{ github.event.inputs.release_type }}" == "major" ]]; then
          EXISTING_TAG=$(git tag -l "v${CURRENT_YEAR}.${CURRENT_MONTH}.0")
          if [ -n "$EXISTING_TAG" ]; then
            echo "⚠️ Warning: v${CURRENT_YEAR}.${CURRENT_MONTH}.0 already exists!"
          fi
          VERSION="v${CURRENT_YEAR}.${CURRENT_MONTH}.0"
          echo "🎯 Creating new major version: $VERSION"
        
        elif [[ "${{ github.event.inputs.release_type }}" == "minor" ]]; then
          LATEST_TAG=$(git tag -l "v${CURRENT_YEAR}.${CURRENT_MONTH}.*" --sort=-v:refname | head -n 1)
          
          if [ -z "$LATEST_TAG" ]; then
            VERSION="v${CURRENT_YEAR}.${CURRENT_MONTH}.0"
            echo "🆕 No existing tags for this month, starting with: $VERSION"
          else
            LAST_PATCH=$(echo $LATEST_TAG | awk -F. '{print $3}')
            NEW_PATCH=$((LAST_PATCH + 1))
            VERSION="v${CURRENT_YEAR}.${CURRENT_MONTH}.${NEW_PATCH}"
            echo "⬆️ Incrementing from $LATEST_TAG to $VERSION"
          fi
        fi

        if git rev-parse "$VERSION" >/dev/null 2>&1; then
          echo "❌ Error: Tag $VERSION already exists!"
          exit 1
        fi

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "✅ Final version: $VERSION"

    - name: Extract release notes from CHANGELOG.md
      id: changelog
      run: |
        if [[ -n "${{ github.event.inputs.release_notes_override }}" ]]; then
          echo "📝 Using manually provided release notes"
          NOTES="${{ github.event.inputs.release_notes_override }}"
        elif [[ ! -f "CHANGELOG.md" ]]; then
          echo "⚠️ CHANGELOG.md not found, using default notes"
          NOTES="No changelog available."
        else
          echo "📖 Reading release notes from CHANGELOG.md [Unreleased] section"

          NOTES=$(awk '
            /^## \[Unreleased\]/ { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/{ /./!d }' | sed '1{/^$/d}')

          if [[ -z "$NOTES" ]]; then
            echo "⚠️ [Unreleased] section is empty, using default notes"
            NOTES="No unreleased changes documented."
          else
            echo "✅ Successfully extracted changelog notes"
          fi
        fi

        echo "$NOTES" > /tmp/release_notes.txt
        {
          echo "release_notes<<CHANGELOG_EOF"
          cat /tmp/release_notes.txt
          echo "CHANGELOG_EOF"
        } >> $GITHUB_OUTPUT

    - name: Get current date
      id: date
      run: echo "current_date=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install test dependencies
      run: |
        go install gotest.tools/gotestsum@latest
    
    - name: Run Go tests
      run: |
        make test-server

    - name: Install dependencies
      run: make setup

    - name: Build for all platforms
      run: make build VERSION=${{ steps.version.outputs.version }}

    - name: Create release packages
      run: |
        mkdir -p ./release_packages

        # Linux x86_64 (.tar.gz)
        cp ./debug/folderhost ./folderhost-linux-amd64
        chmod +x ./folderhost-linux-amd64
        tar -czf ./release_packages/folderhost-linux-amd64.tar.gz ./folderhost-linux-amd64
        rm ./folderhost-linux-amd64
        echo "✅ Linux x86_64 package created"

        # Linux ARM32 (.tar.gz)
        cp ./debug/folderhost-linux-arm ./folderhost-linux-armv7
        chmod +x ./folderhost-linux-armv7
        tar -czf ./release_packages/folderhost-linux-armv7.tar.gz ./folderhost-linux-armv7
        rm ./folderhost-linux-armv7
        echo "✅ Linux ARM32 package created"

        # Linux ARM64 (.tar.gz)
        cp ./debug/folderhost-linux-arm64 ./folderhost-linux-arm64
        chmod +x ./folderhost-linux-arm64
        tar -czf ./release_packages/folderhost-linux-arm64.tar.gz ./folderhost-linux-arm64
        rm ./folderhost-linux-arm64
        echo "✅ Linux ARM64 package created"

        # Windows (.zip - sadece Windows)
        cp ./debug/folderhost.exe ./folderhost-windows-amd64.exe
        zip -j ./release_packages/folderhost-windows-amd64.zip ./folderhost-windows-amd64.exe
        rm ./folderhost-windows-amd64.exe
        echo "✅ Windows package created"

        # macOS Intel (.tar.gz)
        cp ./debug/folderhost-mac-amd64 ./folderhost-macos-intel
        chmod +x ./folderhost-macos-intel
        tar -czf ./release_packages/folderhost-macos-intel.tar.gz ./folderhost-macos-intel
        rm ./folderhost-macos-intel
        echo "✅ macOS Intel package created"

        # macOS ARM (.tar.gz)
        cp ./debug/folderhost-mac-arm64 ./folderhost-macos-applesilicon
        chmod +x ./folderhost-macos-applesilicon
        tar -czf ./release_packages/folderhost-macos-applesilicon.tar.gz ./folderhost-macos-applesilicon
        rm ./folderhost-macos-applesilicon
        echo "✅ macOS Apple Silicon package created"

        # FreeBSD (.tar.gz)
        cp ./debug/folderhost-freebsd ./folderhost-freebsd-amd64
        chmod +x ./folderhost-freebsd-amd64
        tar -czf ./release_packages/folderhost-freebsd-amd64.tar.gz ./folderhost-freebsd-amd64
        rm ./folderhost-freebsd-amd64
        echo "✅ FreeBSD package created"

    - name: Verify packages
      run: |
        echo "📦 Release packages:"
        ls -lh ./release_packages/
        echo ""
        echo "📊 Package sizes:"
        du -h ./release_packages/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-packages
        path: ./release_packages/

  build-docker:
    runs-on: ubuntu-latest
    needs: build-and-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/folderhost
        tags: |
          type=raw,value=${{ needs.build-and-release.outputs.version }}
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.prod
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Docker image info
      run: |
        echo "🐋 Docker image pushed successfully!"
        echo "📍 Image: ${{ secrets.DOCKERHUB_USERNAME }}/folderhost:${{ needs.build-and-release.outputs.version }}"
        echo "📍 Latest: ${{ secrets.DOCKERHUB_USERNAME }}/folderhost:latest"

  create-release:
    runs-on: ubuntu-latest
    needs: [build-and-release, build-docker]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-packages
        path: ./release_packages/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.build-and-release.outputs.version }}
        name: Release ${{ needs.build-and-release.outputs.version }}
        body: |
          FolderHost Release ${{ needs.build-and-release.outputs.version }}
          
          Release Date: ${{ needs.build-and-release.outputs.current_date }}
          
          ## 📋 What's New
          ${{ needs.build-and-release.outputs.release_notes }}
          
          ## 📦 Downloads
          
          | Platform | Architecture | Format | Download |
          |----------|--------------|--------|----------|
          | Linux | x86_64 | tar.gz | [folderhost-linux-amd64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ needs.build-and-release.outputs.version }}/folderhost-linux-amd64.tar.gz) |
          | Linux | ARMv7 (32-bit) | tar.gz | [folderhost-linux-armv7.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ needs.build-and-release.outputs.version }}/folderhost-linux-armv7.tar.gz) |
          | Linux | ARM64 | tar.gz | [folderhost-linux-arm64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ needs.build-and-release.outputs.version }}/folderhost-linux-arm64.tar.gz) |
          | Windows | x86_64 | zip | [folderhost-windows-amd64.zip](https://github.com/${{ github.repository }}/releases/download/${{ needs.build-and-release.outputs.version }}/folderhost-windows-amd64.zip) |
          | macOS | Intel | tar.gz | [folderhost-macos-intel.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ needs.build-and-release.outputs.version }}/folderhost-macos-intel.tar.gz) |
          | macOS | Apple Silicon (M1/M2/M3) | tar.gz | [folderhost-macos-applesilicon.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ needs.build-and-release.outputs.version }}/folderhost-macos-applesilicon.tar.gz) |
          | FreeBSD | x86_64 | tar.gz | [folderhost-freebsd-amd64.tar.gz](https://github.com/${{ github.repository }}/releases/download/${{ needs.build-and-release.outputs.version }}/folderhost-freebsd-amd64.tar.gz) |
          | Docker | Multi-arch | image | `docker pull ${{ secrets.DOCKERHUB_USERNAME }}/folderhost:${{ needs.build-and-release.outputs.version }}` |
          
          ## 🐋 Docker Usage
          
          ```bash
          # Pull the image
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/folderhost:${{ needs.build-and-release.outputs.version }}
          
          # Or use latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/folderhost:latest
          
          # Run with docker-compose
          # Download docker-compose.prod.yml from repository
          docker-compose -f docker-compose.prod.yml up -d
          ```
          
          **Important:** The application will use port 5000 by default, but you can change this in `config.yml` and update the port mapping in `docker-compose.prod.yml` accordingly.
          
          ## 🔧 Quick Start
          
          ### Linux (x86_64)
          ```bash
          # Download and extract
          wget https://github.com/${{ github.repository }}/releases/download/${{ needs.build-and-release.outputs.version }}/folderhost-linux-amd64.tar.gz
          tar -xzf folderhost-linux-amd64.tar.gz
          chmod +x folderhost-linux-amd64
          
          # Run
          ./folderhost-linux-amd64
          ```
          
          ### Windows
          ```powershell
          # Download, extract, and run
          # Edit config.yml as needed
          folderhost.exe # Or just double click
          ```
          
          ### Docker
          ```bash
          # Run container, you can access the files using docker volumes
          docker run -d \
            --name folderhost-server \
            -p 5000:5000 \
            -v folderhost_data:/app \
            --restart unless-stopped \
            mertjsx/folderhost:${{ needs.build-and-release.outputs.version }}
          ```
          
          ## ⚙️ Manual Configuration
          
          1. Extract the downloaded archive (for binary installations)
          2. Run the application once to generate `config.yml`
          3. Edit `config.yml` to customize settings (especially the port if needed)
          4. For Docker: Update the port mapping in `docker-compose.prod.yml` if you changed the port in `config.yml`
          5. Restart the application
          
          ---
          
          💡 For issues and questions, please visit the [GitHub Issues](https://github.com/${{ github.repository }}/issues) page.
        files: |
          ./release_packages/folderhost-linux-amd64.tar.gz
          ./release_packages/folderhost-linux-armv7.tar.gz
          ./release_packages/folderhost-linux-arm64.tar.gz
          ./release_packages/folderhost-windows-amd64.zip
          ./release_packages/folderhost-macos-intel.tar.gz
          ./release_packages/folderhost-macos-applesilicon.tar.gz
          ./release_packages/folderhost-freebsd-amd64.tar.gz
        draft: false
        prerelease: false
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Release summary
      run: |
        echo "🎉 Release ${{ needs.build-and-release.outputs.version }} created successfully!"
        echo "📍 URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.build-and-release.outputs.version }}"
        echo "🐋 Docker: ${{ secrets.DOCKERHUB_USERNAME }}/folderhost:${{ needs.build-and-release.outputs.version }}"